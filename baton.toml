# ── Tier 3: Security validators ───────────────────────────

[validators.security-no-secrets-in-source]
type = "script"
command = "bash validators/security-no-secrets-in-source.sh"
tags = ["security"]

[validators.security-no-content-in-errors]
type = "script"
command = "bash validators/security-no-content-in-errors.sh"
