[validators.security-no-path-traversal]
type = "script"
command = "bash validators/security-no-path-traversal.sh"
tags = ["security"]

# ── Tier 4: Spec-code sync ────────────────────────────────

[validators.spec-test-refs-exist]
type = "script"
command = "bash validators/spec-test-refs-exist.sh"
tags = ["spec-sync"]

[validators.spec-format-valid]
type = "script"
command = "bash validators/spec-format-valid.sh"
tags = ["spec-sync"]

[validators.spec-untested-count]
type = "script"
command = "bash validators/spec-untested-count.sh"
tags = ["spec-sync"]

[validators.spec-toml-refs-valid]
type = "script"
command = "bash validators/spec-toml-refs-valid.sh"
tags = ["spec-sync"]

