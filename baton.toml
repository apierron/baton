version = "0.6"

[defaults]
timeout_seconds = 300
blocking = true
prompts_dir = "./prompts"
log_dir = "./.baton/logs"
history_db = "./.baton/history.db"
tmp_dir = "./.baton/tmp"

# [runtimes.default]
# type = "api"
# base_url = "https://api.anthropic.com"
# api_key_env = "ANTHROPIC_API_KEY"
# default_model = "claude-haiku"

# ── Existing validators ───────────────────────────────────

[validators.clippy]
type = "script"
command = "cargo clippy --all-targets -- -D warnings"

[validators.tests]
type = "script"
command = "cargo test"

[validators.fuzz-config-parser]
type = "script"
command = "bash validators/fuzz-config-parser.sh"
tags = ["fuzz"]

[validators.fuzz-verdict-parser]
type = "script"
command = "bash validators/fuzz-verdict-parser.sh"
tags = ["fuzz"]

[validators.invariant-no-hashmap]
type = "script"
command = "bash validators/invariant-no-hashmap.sh"
tags = ["invariant"]

[validators.invariant-module-layers]
type = "script"
command = "bash validators/invariant-module-layers.sh"
tags = ["invariant"]

[validators.invariant-error-messages]
type = "script"
command = "bash validators/invariant-error-messages.sh"
tags = ["invariant"]

# ── Tier 1: Invariant enforcement ─────────────────────────

[validators.invariant-no-unwrap-in-prod]
type = "script"
command = "bash validators/invariant-no-unwrap-in-prod.sh"
tags = ["invariant"]

[validators.invariant-no-std-result]
type = "script"
command = "bash validators/invariant-no-std-result.sh"
tags = ["invariant"]

[validators.invariant-no-hardcoded-version]
type = "script"
command = "bash validators/invariant-no-hardcoded-version.sh"
tags = ["invariant"]

[validators.invariant-two-stage-config]
type = "script"
command = "bash validators/invariant-two-stage-config.sh"
tags = ["invariant"]

[validators.invariant-test-at-bottom]
type = "script"
command = "bash validators/invariant-test-at-bottom.sh"
tags = ["invariant"]

[validators.invariant-derive-order]
type = "script"
command = "bash validators/invariant-derive-order.sh"
tags = ["invariant"]

[validators.invariant-no-println-in-lib]
type = "script"
command = "bash validators/invariant-no-println-in-lib.sh"
tags = ["invariant"]

[validators.invariant-no-global-state]
type = "script"
command = "bash validators/invariant-no-global-state.sh"
tags = ["invariant"]

# ── Tier 2: Fuzz validators ───────────────────────────────

[validators.fuzz-placeholder-resolution]
type = "script"
command = "bash validators/fuzz-placeholder-resolution.sh"
tags = ["fuzz"]

[validators.fuzz-run-if-expression]
type = "script"
command = "bash validators/fuzz-run-if-expression.sh"
