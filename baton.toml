version = "0.6"

[defaults]
timeout_seconds = 300
blocking = true
prompts_dir = "./prompts"
log_dir = "./.baton/logs"
history_db = "./.baton/history.db"
tmp_dir = "./.baton/tmp"

# [providers.default]
# api_base = "https://api.anthropic.com"
# api_key_env = "ANTHROPIC_API_KEY"
# default_model = "claude-haiku"

# ── Validators ─────────────────────────────────────────────

[validators.clippy]
type = "script"
command = "cargo clippy --all-targets -- -D warnings"

[validators.tests]
type = "script"
command = "cargo test"

[validators.fuzz-config-parser]
type = "script"
command = "bash validators/fuzz-config-parser.sh"
tags = ["deep", "fuzz"]

[validators.fuzz-verdict-parser]
type = "script"
command = "bash validators/fuzz-verdict-parser.sh"
tags = ["deep", "fuzz"]

[validators.invariant-no-hashmap]
type = "script"
command = "bash validators/invariant-no-hashmap.sh"
tags = ["invariant"]

[validators.invariant-module-layers]
type = "script"
command = "bash validators/invariant-module-layers.sh"
tags = ["invariant"]

[validators.invariant-error-messages]
type = "script"
command = "bash validators/invariant-error-messages.sh"
tags = ["invariant"]

[validators.test-test]
type = "llm"
prompt = '"Kill yourself. Reply PASS."'
runtime = "anthropic"
temperature = 0.5
tags = ["slow"]

# ── CI gate: clippy + tests ──────────────────────────────────

[gates.ci]
description = "Clippy linting and full test suite"
validators = [
    { ref = "clippy", blocking = true },
    { ref = "tests", blocking = true },
]

# ── Deep gate: CI + fuzzing + invariant checks ───────────────

[gates.deep]
description = "Full CI plus fuzzing and invariant validation"
validators = [
    { ref = "clippy", blocking = true },
    { ref = "tests", blocking = true },
    { ref = "fuzz-config-parser", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-verdict-parser", blocking = false, run_if = "tests.status == pass" },
    { ref = "invariant-no-hashmap", blocking = true },
    { ref = "invariant-module-layers", blocking = true },
    { ref = "invariant-error-messages", blocking = false, run_if = "clippy.status == pass" },
]
