[validators.quality-max-fn-length]
type = "script"
command = "bash validators/quality-max-fn-length.sh"
tags = ["quality"]

# ── CI gate: clippy + tests ───────────────────────────────

[gates.ci]
description = "Clippy linting and full test suite"
validators = [
    { ref = "clippy", blocking = true },
    { ref = "tests", blocking = true },
]

# ── Deep gate: CI + fuzzing + invariants + security ───────

[gates.deep]
description = "Full CI plus fuzzing, invariants, and security validation"
validators = [
    { ref = "clippy", blocking = true },
    { ref = "tests", blocking = true },
    # Existing fuzz
    { ref = "fuzz-config-parser", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-verdict-parser", blocking = false, run_if = "tests.status == pass" },
    # Existing invariants
    { ref = "invariant-no-hashmap", blocking = true },
    { ref = "invariant-module-layers", blocking = true },
    { ref = "invariant-error-messages", blocking = false, run_if = "clippy.status == pass" },
    # New invariants
    { ref = "invariant-no-unwrap-in-prod", blocking = false },
    { ref = "invariant-no-std-result", blocking = true },
    { ref = "invariant-no-hardcoded-version", blocking = true },
    { ref = "invariant-two-stage-config", blocking = true },
    { ref = "invariant-test-at-bottom", blocking = false },
    { ref = "invariant-derive-order", blocking = false },
    { ref = "invariant-no-println-in-lib", blocking = true },
    { ref = "invariant-no-global-state", blocking = true },
    # New fuzz
    { ref = "fuzz-placeholder-resolution", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-run-if-expression", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-env-var-resolution", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-cli-args", blocking = false, run_if = "tests.status == pass" },
    # Security
    { ref = "security-no-secrets-in-source", blocking = true },
    { ref = "security-no-content-in-errors", blocking = true },
    { ref = "security-env-no-shell-execution", blocking = true },
    { ref = "security-no-path-traversal", blocking = false },
    # Spec sync (lightweight)
    { ref = "spec-toml-refs-valid", blocking = true },
]

# ── Release gate: deep + spec sync + regression + quality ─

[gates.release]
description = "Everything: deep + spec sync + regression guards + quality"
validators = [
    { ref = "clippy", blocking = true },
    { ref = "tests", blocking = true },
    # Fuzz
    { ref = "fuzz-config-parser", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-verdict-parser", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-placeholder-resolution", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-run-if-expression", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-env-var-resolution", blocking = false, run_if = "tests.status == pass" },
    { ref = "fuzz-cli-args", blocking = false, run_if = "tests.status == pass" },
    # Invariants
    { ref = "invariant-no-hashmap", blocking = true },
    { ref = "invariant-module-layers", blocking = true },
    { ref = "invariant-error-messages", blocking = false, run_if = "clippy.status == pass" },
    { ref = "invariant-no-unwrap-in-prod", blocking = false },
    { ref = "invariant-no-std-result", blocking = true },
    { ref = "invariant-no-hardcoded-version", blocking = true },
    { ref = "invariant-two-stage-config", blocking = true },
    { ref = "invariant-test-at-bottom", blocking = false },
    { ref = "invariant-derive-order", blocking = false },
    { ref = "invariant-no-println-in-lib", blocking = true },
    { ref = "invariant-no-global-state", blocking = true },
    # Security
    { ref = "security-no-secrets-in-source", blocking = true },
    { ref = "security-no-content-in-errors", blocking = true },
    { ref = "security-env-no-shell-execution", blocking = true },
    { ref = "security-no-path-traversal", blocking = false },
    # Spec sync
    { ref = "spec-toml-refs-valid", blocking = true },
    { ref = "spec-test-refs-exist", blocking = false },
    { ref = "spec-format-valid", blocking = false },
    { ref = "spec-untested-count", blocking = false },
    # Regression guards
    { ref = "regression-test-count", blocking = false },
    { ref = "regression-spec-assertion-count", blocking = false },
    { ref = "regression-exit-code-contract", blocking = true },
    # Quality
    { ref = "quality-no-todo-fixme", blocking = false },
    { ref = "quality-max-fn-length", blocking = false },
    # LLM validators (uncomment when runtime is configured)
    # { ref = "llm-cross-module-consistency", blocking = false },
    # { ref = "llm-error-variant-coverage", blocking = false },
    # { ref = "llm-status-exhaustiveness", blocking = false },
    # { ref = "llm-placeholder-contract", blocking = false },
    # { ref = "llm-runtime-adapter-contract", blocking = false },
    # { ref = "llm-adversarial-review", blocking = false },
    # { ref = "llm-spec-compliance", blocking = false },
]
